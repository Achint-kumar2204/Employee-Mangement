name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Config Server
        run: mvn clean verify
        working-directory: config-server

      - name: Build Eureka Server
        run: mvn clean verify
        working-directory: eureka-server

      - name: Build Auth Service
        run: mvn clean verify
        working-directory: auth-service

      - name: Build Department Service
        run: mvn clean verify
        working-directory: department-service

      - name: Build Employee Service
        run: mvn clean verify
        working-directory: employee-service

      - name: Build API Gateway
        run: mvn clean verify
        working-directory: api-gateway